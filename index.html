    <form action="">
        <select name="" id="">
            <option value="odaberi" selected disabled>Odaberi artikal</option>
            <option value="kuhinjaUn">Kuhinja UN</option>
            <option value="kuhinjaMe">Kuhinja ME</option>
            <option value="amerPlakarUn">Americki plakar UN</option>
            <option value="amerPlakarMe">Americki plakar ME</option>
            <option value="plakar">Plakar</option>
        </select>
        <input id="visina" type="number" placeholder="Visina" required>
        <input id="sirina" type="number" placeholder="Sirina" required>
        <input id="dubina" type="number" placeholder="Dubina" required>
        <input id="btn" type="button" onclick="result()" value="Izracunaj">
    </form>
    

    <fieldset>
        <legend>Rezultat</legend>
        <div id="result"></div>
        <div id="univer"></div>
        <div id="kant"></div>
        <div id="lijepak"></div>
        <div id="lesonit"></div>
        <div id="brKrila"></div>
    </fieldset>


    <script src="index.js"></script>
    <script>
        var a = document.getElementById("sirina"),
        b = document.getElementById("visina"),
        c = document.getElementById("dubina");

        a.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
            b.focus()
        }
        });
        b.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
            c.focus()
            }
        });
        c.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.getElementById("btn").click()
        }
        });
    </script>
